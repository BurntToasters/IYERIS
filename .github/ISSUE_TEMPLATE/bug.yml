name: Bug report
description: Report a defect in IYERIS
labels: ['bug']
body:
  - type: input
    id: version
    attributes:
      label: IYERIS version
      placeholder: e.g. 2.2.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: e.g. macOS 14.5, Windows 11 23H2, Ubuntu 24.04
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open IYERIS
        2. Navigate to ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      render: shell
